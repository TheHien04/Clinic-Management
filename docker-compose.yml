# Full stack: SQL Server + Redis + API + static frontend (nginx).
# Prerequisites: copy .env.docker.example -> .env in repo root.
#
# Apple Silicon: sqlserver image uses platform linux/amd64 (Rosetta/emulation).
# Startup can take 30–60s on first run while migrations apply.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Create .env from .env.docker.example}"
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "5055"
      PORT_FALLBACK_ATTEMPTS: "1"
      DB_SERVER: sqlserver
      DB_USER: sa
      DB_PASSWORD: "${MSSQL_SA_PASSWORD}"
      DB_NAME: ClinicManagement
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      CORS_ORIGIN: http://localhost:5173,http://localhost:8080
      SOCKET_CORS_ORIGIN: http://localhost:5173,http://localhost:8080
      JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET in .env}"
      REDIS_URL: redis://redis:6379
      SKIP_DB_MIGRATE: "${SKIP_DB_MIGRATE:-0}"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5055:5055"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5055/api
        VITE_SOCKET_URL: http://localhost:5055
    depends_on:
      - backend
    ports:
      - "8080:80"
